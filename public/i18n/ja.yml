PLUGIN_IMPORT_SUCCEED: プラグインのインポートに成功しました
PLUGIN_IMPORT_FAILED: プラグインのインポートに失敗しました
ENABLE_PLUGIN: プラグインを有効化
DISABLE_PLUGIN: プラグインを無効化
UNINSTALL_PLUGIN: プラグインをアンインストール
UPDATE_PLUGIN: プラグインを更新

# toolbox
TOOLBOX: ツールボックス
TOOLBOX_TITLE: PicGo 実行時の問題をトラブルシューティング
TOOLBOX_SUB_TITLE: 以下の項目を直ちにスキャンして使用上の問題を修正します
TOOLBOX_CHECK_CONFIG_FILE_BROKEN: 設定ファイルが破損していないか確認
TOOLBOX_CHECK_GALLERY_FILE_BROKEN: アルバムファイルが破損していないか確認
TOOLBOX_CHECK_PROBLEM_WITH_CLIPBOARD_PIC_UPLOAD: クリップボード画像アップロードに問題がないか確認
TOOLBOX_CHECK_PROBLEM_WITH_PROXY: プロキシ設定が正常か確認
TOOLBOX_FIX_DONE_NEED_RELOAD: 修復完了。再起動して有効にしますか？
TOOLBOX_CANT_AUTO_FIX: 自動修復できません。以下の問題を手動で修正してください
TOOLBOX_START_SCAN: スキャン開始
TOOLBOX_RE_SCAN: 再スキャン
TOOLBOX_START_FIX: 修復開始
TOOLBOX_SUCCESS_TIPS: おめでとうございます、問題は見つかりませんでした
TOOLBOX_CHECK_CONFIG_FILE_PATH_TIPS: "設定ファイルのパス：${path}"
TOOLBOX_CHECK_CONFIG_FILE_BROKEN_TIPS: 設定ファイルが破損しています
TOOLBOX_CHECK_GALLERY_FILE_PATH_TIPS: "アルバムファイルのパス：${path}"
TOOLBOX_CHECK_GALLERY_FILE_BROKEN_TIPS: アルバムファイルが破損しています
TOOLBOX_CHECK_PROXY_SUCCESS_TIPS: プロキシ設定は正常です
TOOLBOX_CHECK_PROXY_NO_PROXY_TIPS: プロキシ設定なし
TOOLBOX_CHECK_PROXY_PROXY_IS_NOT_CORRECT: プロキシ設定が正しくありません
TOOLBOX_CHECK_PROXY_PROXY_IS_NOT_WORKING: プロキシ設定が利用できません
TOOLBOX_CHECK_CLIPBOARD_FILE_PATH_TIPS: "クリップボード画像の一時フォルダパス：${path}"
TOOLBOX_CHECK_CLIPBOARD_FILE_PATH_NOT_EXIST_TIPS: "クリップボード画像の一時フォルダが存在しません：${path}"
TOOLBOX_CHECK_CLIPBOARD_FILE_PATH_ERROR_TIPS: "フォルダを手動で作成してください：${path}"

# tips
TIPS_NOTICE: 注意
TIPS_WARNING: 警告
TIPS_ERROR: エラー発生
TIPS_SKIPPED_INVALID_URLS: ${n} 件の不正なURLをスキップしました。詳細はログをご確認ください
TIPS_TOO_MANY_URLS_CONFIRM: ${n} 件のURLを一度にアップロードします。処理が重くなる可能性があります。分割してアップロードすることをお勧めします。続行しますか？
TIPS_NO_VALID_URLS: 有効なURLが見つかりません
TIPS_INSTALL_NODE_AND_RELOAD_PICGO: Node.js をインストールして PicGo を再起動してください
TIPS_PLUGIN_REMOVE_GALLERY_ITEM: プラグインがアルバムから画像を削除しようとしています。続行しますか？
TIPS_PLUGIN_OVERWRITE_GALLERY: プラグインがアルバムリストを上書きしようとしています。続行しますか？
TIPS_UPLOAD_NOT_PICTURES: クリップボードの最新レコードは画像ではありません
TIPS_PICGO_CONFIG_FILE_BROKEN_WITH_DEFAULT: PicGo 設定ファイルが破損しています。デフォルト設定に復元されました
TIPS_PICGO_CONFIG_FILE_BROKEN_WITH_BACKUP: PicGo 設定ファイルが破損しています。バックアップ設定に復元されました
TIPS_PICGO_BACKUP_FILE_VERSION: "バックアップファイルバージョン: ${v}"
TIPS_CUSTOM_CONFIG_FILE_PATH_ERROR: カスタムファイルの解析エラー。パスの内容を確認してください
TIPS_SHORTCUT_MODIFIED_SUCCEED: ショートカットが正常に変更されました
TIPS_SHORTCUT_MODIFIED_CONFLICT: ショートカットが競合しています。再設定してください
TIPS_CUSTOM_LINK_STYLE_MODIFIED_SUCCEED: カスタムリンク形式が正常に変更されました
TIPS_FIND_NEW_VERSION: 新しいバージョン ${v} が見つかりました。多くの新機能が更新されています。最新バージョンをダウンロードしますか？
TIPS_DELETE_UPLOADER_CONFIG: この設定を削除しますか？
TIPS_COPY_UPLOADER_CONFIG: この設定をコピーしますか？
TIPS_UPLOADER_CONFIG_NAME_EMPTY: 設定名は空にできません
TIPS_UPLOADER_CONFIG_NOT_FOUND: 設定が見つかりません
TIPS_UPLOADER_CONFIG_CANNOT_DELETE_LAST: 最後の設定は削除できません

